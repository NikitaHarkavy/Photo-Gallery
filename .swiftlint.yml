opt_in_rules:
  - empty_count
  - closure_spacing
  - sorted_imports

disabled_rules:
  - trailing_whitespace
  - todo

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

excluded:
  - Pods
  - DerivedData
  - .build


